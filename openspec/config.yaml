schema: spec-driven

context: |
  Project: Cursor agent standards template
  Stable governance files: CURSOR.md, CURSOR.local.md, WORKFLOW.md, docs/
  OpenSpec role: use openspec/specs/ for accepted long-lived requirements and
  openspec/changes/ for in-flight deltas.
  Testing entrypoint: npm test -> bash scripts/validate-repository.sh
  Boundary rule: stay inside the current project scope and do not add cross-project
  compatibility behavior unless the normative files explicitly require it.
  Testing rule: do not add compatibility-only, fallback, dual-track, or legacy
  preservation tests outside the accepted project boundary.

rules:
  proposal:
    - State which normative files or workflow contracts will change.
    - Keep scope MVP-sized, call out explicit non-goals, and reject out-of-boundary extensions.
  specs:
    - Use MUST or SHALL language for normative requirements.
    - Include scenarios for success path, failure path, and validation evidence.
    - Do not encode compatibility-only behavior unless the repository norms explicitly accept it.
  design:
    - Explain goals, non-goals, contracts, state flow, failure paths, and rollback impact only when explanatory design text is truly needed.
  tasks:
    - Map work items to concrete repository files and validation commands without crossing project boundaries.

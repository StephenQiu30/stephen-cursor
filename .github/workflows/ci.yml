name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  repository-check:
    name: Repository validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate files and executable syntax
        run: bash scripts/validate-repository.sh

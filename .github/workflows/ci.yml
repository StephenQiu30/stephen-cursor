name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  repository-check:
    name: Python syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate merge helper syntax
        run: python -m py_compile .cursor/skills/land/land_watch.py
